<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | The Invisible Cipher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="site-header"></header>
    <main>
        <div class="content-wrapper"
            style="grid-template-columns: 1fr; max-width: 600px; text-align: center; padding-top: 5rem;">
            <h1 style="font-size: 3rem; margin-bottom: 2rem;">Get in Touch</h1>
            <form action="https://formspree.io/f/mdalwerd" method="POST"
                style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left;">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="name" style="font-weight: 500;">Name</label>
                    <input type="text" id="name" name="name" required
                        style="padding: 0.8rem; border: 1px solid var(--border-color); outline: none;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="email" style="font-weight: 500;">Email</label>
                    <input type="email" id="email" name="email" required
                        style="padding: 0.8rem; border: 1px solid var(--border-color); outline: none;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="message" style="font-weight: 500;">Message</label>
                    <textarea id="message" name="message" rows="5" required
                        style="padding: 0.8rem; border: 1px solid var(--border-color); outline: none;"></textarea>
                </div>
                <button type="submit"
                    style="background: var(--primary-color); color: #fff; padding: 1rem; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">Send
                    Message</button>
            </form>
        </div>
    </main>
    <footer id="site-footer"></footer>
    <script type="module">
        import { initHeader } from './src/components/header.js';
        import { initFooter } from './src/components/footer.js';
        import { initSidebar } from './src/components/sidebar.js';
        initHeader();
        initFooter();
        initSidebar();
    </script>
</body>

</html>
